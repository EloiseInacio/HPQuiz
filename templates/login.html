{% extends "base.html" %}
{% block title %}⚡ HP Quiz — Login{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-12">
  <h1 class="text-3xl font-bold text-yellow-400 mb-8 text-center">Login</h1>

  {% if error %}
  <div class="mb-6 p-4 bg-red-900/60 border border-red-500 rounded-xl text-red-200 text-sm">
    {{ error }}
  </div>
  {% endif %}

  <form method="POST" action="/login" class="space-y-5">
    <div>
      <label class="block text-sm font-semibold text-gray-300 uppercase tracking-widest mb-2">
        Username
      </label>
      <input type="text" name="username" required autofocus
             class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-3
                    text-gray-100 focus:outline-none focus:border-yellow-400 transition-colors">
    </div>
    <div>
      <label class="block text-sm font-semibold text-gray-300 uppercase tracking-widest mb-2">
        Password
      </label>
      <input type="password" name="password" required
             class="w-full bg-gray-800 border border-gray-600 rounded-xl px-4 py-3
                    text-gray-100 focus:outline-none focus:border-yellow-400 transition-colors">
    </div>
    <button type="submit"
            class="w-full py-3 bg-yellow-400 hover:bg-yellow-300 text-gray-950
                   font-bold text-lg rounded-xl transition-colors">
      Login ⚡
    </button>
  </form>
</div>
{% endblock %}
