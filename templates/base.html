<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}⚡ HP Quiz{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-sans">

  <header class="border-b border-yellow-400/20 py-4 px-6 mb-8 flex items-center justify-between">
    <a href="/" class="text-2xl font-bold text-yellow-400 hover:text-yellow-300 transition-colors">
      ⚡ HP Quiz
    </a>
    <div class="flex items-center gap-4 text-sm">
      {% if session.get("role") == "admin" %}
        <a href="/admin" class="text-yellow-400 hover:text-yellow-300 font-semibold">⚙ Admin</a>
        <a href="/stats" class="text-gray-400 hover:text-gray-200">My Stats</a>
        <span class="text-gray-500">{{ session.get("username") }}</span>
        <a href="/logout" class="text-gray-400 hover:text-gray-200">Logout</a>
      {% elif session.get("username") %}
        <a href="/stats" class="text-gray-400 hover:text-gray-200">My Stats</a>
        <span class="text-gray-500">{{ session.get("username") }}</span>
        <a href="/logout" class="text-gray-400 hover:text-gray-200">Logout</a>
      {% else %}
        <a href="/login" class="text-gray-400 hover:text-gray-200">Login</a>
      {% endif %}
    </div>
  </header>

  <main class="max-w-2xl mx-auto px-4 pb-16">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
